# Atomic Deep Dark Theme for Yazi
# Based on the One Dark color palette used across your dotfiles

[manager]
cwd = { fg = "#56b6c2" }

# Hovered
hovered         = { fg = "#121317", bg = "#61afef" }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#e5c07b", italic = true }
find_position = { fg = "#c678dd", bg = "reset", italic = true }

# Marker
marker_copied   = { fg = "#98c379", bg = "#98c379" }
marker_cut      = { fg = "#e06c75", bg = "#e06c75" }
marker_marked   = { fg = "#56b6c2", bg = "#56b6c2" }
marker_selected = { fg = "#e5c07b", bg = "#e5c07b" }

# Tab
tab_active   = { fg = "#121317", bg = "#61afef" }
tab_inactive = { fg = "#abb2bf", bg = "#282c34" }
tab_width    = 1

# Border
border_symbol = "│"
border_style  = { fg = "#5c6370" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#282c34", bg = "#282c34" }

# Mode
mode_normal = { fg = "#121317", bg = "#61afef", bold = true }
mode_select = { fg = "#121317", bg = "#98c379", bold = true }
mode_unset  = { fg = "#121317", bg = "#e06c75", bold = true }

# Progress
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#61afef", bg = "#282c34" }
progress_error  = { fg = "#e06c75", bg = "#282c34" }

# Permissions
permissions_t = { fg = "#61afef" }
permissions_r = { fg = "#e5c07b" }
permissions_w = { fg = "#e06c75" }
permissions_x = { fg = "#98c379" }
permissions_s = { fg = "#5c6370" }

[select]
border   = { fg = "#61afef" }
active   = { fg = "#c678dd" }
inactive = { fg = "#abb2bf" }

[input]
border   = { fg = "#61afef" }
title    = {}
value    = {}
selected = { reversed = true }

[completion]
border   = { fg = "#61afef" }

[tasks]
border  = { fg = "#61afef" }
hovered = { underline = true }

[which]
mask            = { bg = "#282c34" }
cand            = { fg = "#56b6c2" }
rest            = { fg = "#abb2bf" }
desc            = { fg = "#c678dd" }
separator       = "  "
separator_style = { fg = "#5c6370" }

[help]
on      = { fg = "#98c379" }
exec    = { fg = "#56b6c2" }
desc    = { fg = "#abb2bf" }
hovered = { bg = "#282c34", bold = true }
footer  = { fg = "#282c34", bg = "#abb2bf" }

[filetype]
rules = [
	# Images
	{ mime = "image/*", fg = "#56b6c2" },

	# Videos
	{ mime = "video/*", fg = "#e5c07b" },
	{ mime = "audio/*", fg = "#e5c07b" },

	# Archives
	{ mime = "application/zip",             fg = "#c678dd" },
	{ mime = "application/gzip",            fg = "#c678dd" },
	{ mime = "application/x-tar",           fg = "#c678dd" },
	{ mime = "application/x-bzip",          fg = "#c678dd" },
	{ mime = "application/x-bzip2",         fg = "#c678dd" },
	{ mime = "application/x-7z-compressed", fg = "#c678dd" },
	{ mime = "application/x-rar",           fg = "#c678dd" },

	# Fallback
	{ name = "*", fg = "#abb2bf" },
	{ name = "*/", fg = "#61afef" }
]
