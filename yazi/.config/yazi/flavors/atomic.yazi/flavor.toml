# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[manager]
cwd = { fg = "#56b6c2" }

# Find
find_keyword  = { fg = "#e5c07b", bold = true, italic = true, underline = true }
find_position = { fg = "#61afef", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#98c379", bg = "#98c379" }
marker_cut      = { fg = "#e06c75", bg = "#e06c75" }
marker_marked   = { fg = "#56b6c2", bg = "#56b6c2" }
marker_selected = { fg = "#e5c07b", bg = "#e5c07b" }

# Count
count_copied   = { fg = "#121317", bg = "#98c379" }
count_cut      = { fg = "#121317", bg = "#e06c75" }
count_selected = { fg = "#121317", bg = "#e5c07b" }

# Border
border_symbol = "│"
border_style  = { fg = "#5c6370" }

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#121317", bg = "#61afef", bold = true }
inactive = { fg = "#61afef", bg = "#282c34" }

# : }}}


# : Mode {{{

[mode]

normal_main = { fg = "#121317", bg = "#61afef", bold = true }
normal_alt  = { fg = "#61afef", bg = "#282c34" }

# Select mode
select_main = { fg = "#121317", bg = "#56b6c2", bold = true }
select_alt  = { fg = "#56b6c2", bg = "#282c34" }

# Unset mode
unset_main = { fg = "#121317", bg = "#d19a66", bold = true }
unset_alt  = { fg = "#d19a66", bg = "#282c34" }

# : }}}


# : Status bar {{{

[status]
# Permissions
perm_sep   = { fg = "#5c6370" }
perm_type  = { fg = "#61afef" }
perm_read  = { fg = "#e5c07b" }
perm_write = { fg = "#e06c75" }
perm_exec  = { fg = "#98c379" }

# Progress
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#98c379", bg = "#5c6370" }
progress_error  = { fg = "#e5c07b", bg = "#e06c75" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#61afef" }
active   = { fg = "#61afef", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#61afef" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border = { fg = "#61afef" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#61afef" }
title   = {}
hovered = { fg = "#61afef", bold = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#282c34" }
cand            = { fg = "#56b6c2" }
rest            = { fg = "#5c6370" }
desc            = { fg = "#61afef" }
separator       = "  "
separator_style = { fg = "#5c6370" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#56b6c2" }
run     = { fg = "#61afef" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#282c34", bg = "#abb2bf" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#61afef" }
title    = { fg = "#61afef" }
tbl_col  = { fg = "#56b6c2" }
tbl_cell = { fg = "#61afef", bg = "#5c6370" }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#98c379" }
title_warn  = { fg = "#e5c07b" }
title_error = { fg = "#e06c75" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Image
	{ mime = "image/*", fg = "#56b6c2" },
	# Media
	{ mime = "{audio,video}/*", fg = "#e5c07b" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#61afef" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#98c379" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#5c6370" },
	# Fallback
	{ name = "*", fg = "#abb2bf" },
	{ name = "*/", fg = "#61afef" },
]

# : }}}

[icon]

dirs = [
	{ name = ".config", text = "", fg = "#61afef" },
	{ name = ".git", text = "", fg = "#56b6c2" },
	{ name = ".github", text = "", fg = "#61afef" },
	{ name = ".npm", text = "", fg = "#61afef" },
	{ name = "Desktop", text = "", fg = "#56b6c2" },
	{ name = "Development", text = "", fg = "#56b6c2" },
	{ name = "Documents", text = "", fg = "#56b6c2" },
	{ name = "Downloads", text = "", fg = "#56b6c2" },
	{ name = "Library", text = "", fg = "#56b6c2" },
	{ name = "Movies", text = "", fg = "#56b6c2" },
	{ name = "Music", text = "", fg = "#56b6c2" },
	{ name = "Pictures", text = "", fg = "#56b6c2" },
	{ name = "Public", text = "", fg = "#56b6c2" },
	{ name = "Videos", text = "", fg = "#56b6c2" },
]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#abb2bf" },
	{ if = "link", text = "", fg = "#5c6370" },
	{ if = "block", text = "", fg = "#d19a66" },
	{ if = "char", text = "", fg = "#d19a66" },
	{ if = "fifo", text = "", fg = "#d19a66" },
	{ if = "sock", text = "", fg = "#d19a66" },
	{ if = "sticky", text = "", fg = "#d19a66" },
	{ if = "dummy", text = "", fg = "#e06c75" },

	# Fallback
	{ if = "dir & hovered", text = "", fg = "#61afef" },
	{ if = "dir", text = "", fg = "#61afef" },
	{ if = "exec", text = "", fg = "#98c379" },
	{ if = "!dir", text = "", fg = "#abb2bf" },
]
